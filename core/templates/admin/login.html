{% load static %}
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>GYAgency Admin Page</title>
    <style>
        /* ይህ ክፍል ነው ዲዛይኑን ወደ መሃል የሚያመጣው */
        body {
            font-family: Arial, sans-serif;
            background-color: #129e31;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 70;
        }
        .login-box {
            background: rgb(255, 255, 255);
            padding: 90px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(36, 15, 15, 0.1);
            text-align: center;
            width: 300px;
        }
        h2 { color: #333; }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>GYAgency Admin Page</h2>
    
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Log in</button>
    </form>
</div>

</body>
</html>
