<!DOCTYPE html>
<html lang="am">
<head>

    <title>የክፍያ ስህተት</title>

</head>
<body class="bg-light text-center py-5">
    <div class="container card shadow p-5 border-0 rounded-4 mt-5" style="max-width: 500px; margin: auto; border-top: 5px solid #dc3545 !important;">
        <h1 class="text-danger mb-3">⚠️ የክፍያ ስህተት አጋጥሟል!</h1>
        <p class="lead text-muted">ከቻፓ (Chapa) ጋር መገናኘት አልተቻለም።</p>

            <b>የስህተት ምክንያት፦</b> {{ error }}
        </div>
        <a href="/" class="btn btn-secondary mt-3">ወደ ዋናው ገጽ ተመለስ</a>
    </div>
</body>
</html>
